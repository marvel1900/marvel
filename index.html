<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سایت من</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:55px;
margin-bottom:20px;
}

p{
font-size:20px;
max-width:700px;
line-height:1.8;
color:#ddd;
}

.btn{
margin-top:35px;
padding:15px 35px;
background:#38bdf8;
color:white;
text-decoration:none;
border-radius:30px;
transition:.3s;
font-size:18px;
}

.btn:hover{
background:#0284c7;
transform:scale(1.05);
}

section{
padding:80px 10%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
background:#334155;
}

footer{
text-align:center;
padding:30px;
background:#020617;
color:#aaa;
}
</style>
</head>

<body>

<header>

<h1>به سایت من خوش آمدید</h1>

<p>
این سایت با HTML و CSS ساخته شده و روی GitHub Pages میزبانی می‌شود.
</p>

<a class="btn" href="#services">
شروع کنیم
</a>

</header>

<section id="services">

<h2 style="text-align:center;font-size:35px;">خدمات</h2>

<div class="cards">

<div class="card">
<h3>طراحی سایت</h3>
<p>طراحی مدرن، سریع و ریسپانسیو.</p>
</div>

<div class="card">
<h3>برنامه نویسی</h3>
<p>توسعه انواع پروژه‌های تحت وب.</p>
</div>

<div class="card">
<h3>پشتیبانی</h3>
<p>بهینه‌سازی و نگهداری سایت.</p>
</div>

</div>

</section>

<footer>

© 2026 تمامی حقوق محفوظ است.

</footer>

</body>
</html>
